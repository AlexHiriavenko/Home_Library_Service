version: '3.8'

services:
  db:
    container_name: postgres
    image: postgres:15-alpine
    restart: always
    ports:
      - ${DB_PORT}:${DB_PORT}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 10s
      retries: 5

  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - ${PORT}:${PORT}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - .:/app
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      npx prisma migrate dev --name init &&
      npm run start:prod
      "
volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
