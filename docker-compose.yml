version: '3.8'

services:
  app:
    container_name: app
    image: node
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - ${PORT}:${PORT}
    environment:
      NODE_ENV: production
    depends_on:
      - db
    volumes:
      - .:/app
    networks:
      - app-network

  db:
    container_name: postgres
    image: postgres:15-alpine
    restart: always
    ports:
      - ${DB_PORT}:${DB_PORT}
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
